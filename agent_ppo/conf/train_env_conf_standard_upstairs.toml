# =============================================================================
# Stair Up Training: focused training on pyramid_stairs_inv terrain only.
# 专注训练上楼梯：仅使用 pyramid_stairs_inv 地形。
#
# Key changes vs. standard:
# 1. Single terrain type (pyramid_stairs_inv) for focused learning
# 2. Reduced initial difficulty level to ease learning
# 3. Lower initial velocity commands to prevent falls
# 4. Reduced entropy_coef for stable convergence
# 5. Stronger stability rewards (feet_stumble, air_time)
# 6. Symmetry rewards (feet_air_time_variance) to prevent lateral bias
# =============================================================================

# === Basic Configuration ===
# === 基础配置 ===
[env]
# Number of parallel environments, valid range: [1, 4096].
# 并行环境数量，合法范围：[1, 4096]
num_envs = 2048

# Max episode duration (seconds).
# 最大 episode 时长（秒）
episode_length_s = 25

[env_conf]
# Random seed.
# 随机种子
seed = 0


# === Terrain Configuration ===
# === 地形配置 ===
[terrain]
# Terrain mode, valid values: "standard" | "track".
# 地形模式，合法值："standard" | "track"
mode = "standard"

# In standard mode, num_rows = number of difficulty tiers (curriculum levels along X),
# valid range [1, 10], recommended 10.
# standard 模式下 num_rows 表示**难度级别数**（沿 X 轴的课程档位），合法范围：[1, 10]，推荐 10
num_rows = 10

# In standard mode, num_cols = parallel plots within the same difficulty tier along Y,
# valid range [1, 40], recommended 20.
# Note: in standard mode num_cols is NOT a difficulty tier, just parallel plots for env distribution.
# standard 模式下 num_cols 表示**同一难度下的并行地块数**（沿 Y 轴），合法范围：[1, 40]，推荐 20
# 注意：standard 模式下 num_cols 不是难度档，而是用于分散大量 env 到不同地块的并行数
num_cols = 20

# Difficulty range [min, max], valid range: [0.0, 1.0].
# 难度范围 [min, max]，合法范围：[0.0, 1.0]
difficulty_range = [0.0, 1.0]

# Whether to enable terrain curriculum (promote/demote difficulty by performance).
# 是否启用地形课程学习（按表现晋级/降级难度）
curriculum = false

# Max init difficulty tier for robot placement, valid range: [0, 9].
# 机器人初始放置的最大难度档，合法范围：[0, 9]
max_init_terrain_level = 5


# Sub-terrain proportions (all proportions must sum to 1.0).
# Allowed sub-terrains: pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | maze
# 子地形比例（所有 proportion 之和必须 = 1.0）
# 合法子地形：pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | maze
[terrain.standard.pyramid_stairs_inv]
proportion = 1


# === Domain Randomization ===
# === 域随机化 ===
[domain_rand]
# Master switch for domain randomization.
# 域随机化总开关
enable_domain_rand = true

# Whether to randomize ground friction.
# 是否随机化地面摩擦系数
randomize_friction = true

# Friction range [min, max], must be >= 0.
# 摩擦系数采样范围 [min, max]，必须 >= 0
friction_range = [0.3, 1.5]

# Whether to periodically push the robot.
# 是否周期性对机器人施加外部推力
push_robots = true

# Push interval (seconds), must be > 0.
# 推力间隔（秒），必须 > 0
push_interval_s = 15

# Max push velocity in XY plane (m/s), must be >= 0.
# XY 平面最大推力速度 (m/s)，必须 >= 0
max_push_vel_xy = 0.5


# === Observation Noise ===
# === 观测噪声 ===
[noise]
# Whether to add noise to observations.
# 是否在观测中加入噪声
add_noise = true


# === Initial State ===
# === 初始状态 ===
[init_state]
# Robot initial position [x, y, z] (m); z valid range [0.30, 0.60]m, recommended 0.35m.
# 机器人初始位置 [x, y, z] (m)；z 合法范围：[0.30, 0.60]m，推荐 0.35m
pos = [0.0, 0.0, 0.35]


# === Velocity Commands ===
# === 速度命令 ===
[commands]
# Velocity command resampling interval [min, max] (seconds).
# 速度命令重采样区间 [min, max]（秒）
resampling_time = [10.0, 10.0]

[commands.limit]
# Velocity command **hard limits** (curriculum may expand sampling range up to here).
# 速度命令 **采样上限**（硬约束，curriculum 最多扩展到该范围）
lin_vel_x = [-2.0, 2.0]
lin_vel_y = [-1.5, 1.5]
ang_vel_z = [-1.5, 1.5]

[commands.ranges]
# Velocity command **initial sampling ranges** (expand towards limit when curriculum is enabled).
# 速度命令 **初始采样范围**（curriculum 开启时会动态扩大到 limit）

# Start with forward-only to prevent reversing that triggers stair-curriculum demotions;
# curriculum will expand towards limit.
# 初始只前进，避免后退导致楼梯频繁降级；curriculum 会扩展到 limit
lin_vel_x = [0.0, 0.5]
lin_vel_y = [-0.3, 0.3]
ang_vel_yaw = [-1.0, 1.0]


# =====================================================================
# Reward Configuration
# 奖励配置
#
# Each reward term must have a numeric `weight`; parameterized rewards use [rewards.<name>.params].
# 每个奖励项必须包含数值型 weight；带参数的奖励用 [rewards.<name>.params] 配置
# =====================================================================

# --- Positive: velocity tracking ---
# --- 正向：速度跟踪 ---
[rewards.track_lin_vel_xy]
weight = 1.0
[rewards.track_lin_vel_xy.params]
# Std of Gaussian kernel, controls how sharp the error → reward decay is.
# 高斯核标准差，控制误差 → 奖励的衰减陡峭程度
std = 0.25
# Velocity command name.
# 速度命令名
command_name = "base_velocity"

[rewards.track_ang_vel_z]
weight = 0.5
[rewards.track_ang_vel_z.params]
std = 0.25
command_name = "base_velocity"

# --- Negative: base stability ---
# --- 负向：基座稳定 ---
[rewards.lin_vel_z]
# Penalty on vertical linear velocity.
# Z 方向线速度惩罚（抑制上下跳跃）
weight = -2.0

[rewards.ang_vel_xy]
# Penalty on pitch/roll angular velocity.
# X/Y 方向角速度惩罚（抑制 pitch/roll 抖动）
weight = -0.05

# --- Negative: joint smoothness ---
# --- 负向：关节 ---
[rewards.joint_acc]
# Joint acceleration penalty.
# 关节加速度惩罚
weight = -2.5e-7

[rewards.joint_torques]
# Joint torque penalty.
# 关节扭矩惩罚
weight = -1e-4

[rewards.dof_pos_limits]
# Penalty when joints approach position limits.
# 接近关节位置极限时的惩罚
weight = -2.0

# --- Negative: action smoothness ---
# --- 负向：动作平滑 ---
[rewards.action_rate]
# Delta between consecutive actions (1st order).
# 相邻动作差（一阶）
weight = -0.01

# --- Negative: undesired contacts ---
# --- 负向：碰撞 ---
[rewards.undesired_contacts]
weight = -1.0
[rewards.undesired_contacts.params]
# Max allowed contacts before penalty kicks in.
# 触发阈值：被罚前允许的最大接触数
threshold = 1

# --- Extra: anti-tipping ---
# --- 额外：防倾倒 ---
[rewards.flat_orientation]
# Penalty on deviation from flat base orientation.
# 基座偏离水平姿态的惩罚
weight = -1.5

[rewards.reach_goal]
# Reach-goal reward example (active only when env.goal_positions is maintained, i.e. track terrain).
# 到达目标奖励示例（仅在 track 地形下 env.goal_positions 被维护时生效）。
weight = 10.0
[rewards.reach_goal.params]
threshold = 0.6

# --- Positive: energy efficiency (exponential decay of joint mechanical power) ---
# --- 正向：能耗效率（关节机械功率的指数衰减，越节能越高）---
# [rewards.energy_exp]
# weight = 0.2
# [rewards.energy_exp.params]
# scale = 1.0

# # --- Positive: gait symmetry (penalize asymmetric step timing) ---
# # --- 正向：步态对称性（惩罚不对称步态）---
# [rewards.air_time_variance_penalty]
# weight = -0.3

# # --- Negative: foot force symmetry (left-right force imbalance → yaw torque) ---
# # --- 负向：脚部力对称（左右力不平衡 → 偏航力矩）---
# [rewards.foot_force_symmetry]
# weight = -0.5

# # --- Negative: foot height symmetry (one foot lifting higher than the other) ---
# # --- 负向：脚部高度对称（单脚抬得过高的直接惩罚）---
# [rewards.foot_height_symmetry]
# weight = -0.3

# # --- Negative: hip joint returning to default (default pose is symmetric) ---
# # --- 负向：髋关节回默认（默认姿态是对称的，偏离 = 不对称）---
# [rewards.hip_to_default]
# weight = -0.15