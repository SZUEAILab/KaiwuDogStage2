title: 四足机器人-Track导航
groups:
# ============================================================
# 硬件指标
# ============================================================
- group_name: "硬件指标"
  group_name_en: "hardware"
  panels:
    - panel_name: "GPU使用率"
      panel_name_en: "gpu_usage"
      type: "line"
      unit: ""
      custom: ""
      metrics:
        - metrics_name: "gpu_usage"
          expr: "avg_over_time(Device_utilization_desc_of_container[5m]) / 100"
    - panel_name: "GPU显存使用率"
      panel_name_en: "gpu_mem_usage"
      type: "line"
      unit: ""
      custom: ""
      metrics:
        - metrics_name: "gpu_mem_usage"
          expr: "round(avg_over_time(vGPU_device_memory_usage_in_bytes[5m]) / vGPU_device_memory_limit_in_bytes, 0.01)"

# ============================================================
# 全局环境指标（已合并 Track 赛道指标：得分 panel 去 step_score、改加 time_score）
# 注意：代码中 time_score 即 track 评判的时间分数，其 pushgateway 指标 key 仍为 `step_score`
# （见 base_scorer.py: episode_step_scores → metrics["step_score_*"]）。
# 这里 metrics_name 展示为 time_score 以贴合业务语义，但 expr 必须使用 kaiwu_step_score。
# ============================================================
- group_name: 全局环境指标
  group_name_en: env_global
  panels:
  - panel_name: 已结束任务数
    panel_name_en: episode_count
    type: line
    unit: ''
    custom: ''
    metrics:
    - metrics_name: completed_count
      expr: kaiwu_completed_count{}
    - metrics_name: abnormal_count
      expr: kaiwu_abnormal_count{}
    - metrics_name: timeout_count
      expr: kaiwu_timeout_count{}
  - panel_name: 得分
    panel_name_en: score
    type: line
    unit: ''
    custom: ''
    metrics:
    - metrics_name: total_score
      expr: kaiwu_total_score{}
    - metrics_name: energy_score
      expr: kaiwu_energy_score{}
    - metrics_name: pose_score
      expr: kaiwu_pose_score{}
    - metrics_name: time_score
      expr: kaiwu_step_score{}
  - panel_name: 步数
    panel_name_en: step
    type: line
    unit: ''
    custom: ''
    metrics:
    - metrics_name: step_avg
      expr: kaiwu_step_avg{}
  - panel_name: Reward均值
    panel_name_en: reward_mean
    type: line
    unit: ''
    custom: ''
    metrics:
    - metrics_name: reward_mean
      expr: kaiwu_reward_mean{}
    - metrics_name: reward_std
      expr: kaiwu_reward_std{}

# ============================================================
# Track 赛道-难度档（课程升级监控）
# 每个 track_l{col} 对应一条并行赛道（按难度档分组，col ∈ [0, num_cols)，toml 中 num_cols=10，l9 最难）
# 指标集合与上方"全局环境指标.得分"panel 保持一致：total / energy / pose / time
# 另加课程升级必备的三类 episode 计数：completed / abnormal / timeout
# ============================================================
- group_name: Track赛道-难度档
  group_name_en: track_level
  panels:
  - panel_name: 赛道-完成数
    panel_name_en: completed_count_track
