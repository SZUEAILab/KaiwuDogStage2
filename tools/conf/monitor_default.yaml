title: 四足机器人
groups:
# ============================================================
# 硬件指标
# ============================================================
# 添加vgpu相关指标监控
- group_name: "硬件指标"
  group_name_en: "hardware"
  panels:
    - panel_name: "GPU使用率"
      panel_name_en: "gpu_usage"
      type: "line"
      unit: ""
      custom: ""
      metrics:
        - metrics_name: "gpu_usage"
          expr: "avg_over_time(Device_utilization_desc_of_container[5m]) / 100"
    - panel_name: "GPU显存使用率"
      panel_name_en: "gpu_mem_usage"
      type: "line"
      unit: ""
      custom: ""
      metrics:
        - metrics_name: "gpu_mem_usage"
          expr: "round(avg_over_time(vGPU_device_memory_usage_in_bytes[5m]) / vGPU_device_memory_limit_in_bytes, 0.01)"

- group_name: 全局环境指标
  group_name_en: env_global
  panels:
  - panel_name: 已结束任务数
    panel_name_en: episode_count
    type: line
    unit: ''
    custom: ''
    metrics:
    - metrics_name: completed_count
      expr: kaiwu_completed_count{}
    - metrics_name: abnormal_count
      expr: kaiwu_abnormal_count{}
    - metrics_name: timeout_count
      expr: kaiwu_timeout_count{}
  - panel_name: 得分
    panel_name_en: score
    type: line
    unit: ''
    custom: ''
    metrics:
    - metrics_name: total_score
      expr: kaiwu_total_score{}
    - metrics_name: forward_score
      expr: kaiwu_forward_score{}
    - metrics_name: step_score
      expr: kaiwu_step_score{}
    - metrics_name: energy_score
      expr: kaiwu_energy_score{}
    - metrics_name: pose_score
      expr: kaiwu_pose_score{}
  - panel_name: 步数
    panel_name_en: step
    type: line
    unit: ''
    custom: ''
    metrics:
    - metrics_name: step_avg
      expr: kaiwu_step_avg{}
